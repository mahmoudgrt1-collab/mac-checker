<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج وفاحص سيرفرات الماك الاحترافي</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0b0f19;
            --card-bg: #111827;
            --text: #f9fafb;
            --border: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        h2 { text-align: center; color: #3b82f6; margin-top: 0; }
        textarea {
            width: 100%;
            height: 140px;
            background: #030712;
            color: #60a5fa;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            box-sizing: border-box;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #1d4ed8; }
        .result-card {
            background: #030712;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }
        .success { background: #059669; color: white; }
        .failed { background: #dc2626; color: white; }
        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .category-box {
            background: #111827;
            padding: 12px;
            border-radius: 6px;
            border-top: 3px solid #3b82f6;
            max-height: 250px;
            overflow-y: auto;
        }
        .category-box h4 { margin: 0 0 10px 0; color: #60a5fa; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .category-box ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
        .category-box li { padding: 5px 0; border-bottom: 1px dashed #1f2937; color: #e5e7eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔍 الفاحص الذكي لسيرفرات الماك (Bulk Parser & Serverless Checker)</h2>
    <p style="text-align: center; color: #9ca3af;">الصق الأسطر مباشرة وسيتم استخراج الـ DNS والـ MAC وفحص الباقات تلقائياً</p>
    
    <textarea id="rawInput" placeholder="ضع السيرفرات هنا... يمكنك وضع عدة أسطر دفعة واحدة"></textarea>
    <button onclick="processAndCheck()">ابدأ المعالجة والفحص الجماعي السريع 🚀</button>

    <div id="loading" style="display: none; text-align: center; margin-top: 20px; color: #3b82f6; font-weight: bold;">جاري فحص الخوادم من خلال Vercel Serverless...</div>
    
    <div id="outputContainer"></div>
</div>

<script>
function parseLine(line) {
    line = line.trim();
    if (!line) return null;

    // استخراج الماك أدرس الذكي
    const macRegex = /([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})/i;
    const match = line.match(macRegex);

    if (match) {
        const mac = match[0];
        let portal = line.split(mac)[0];
        // تنظيف الرابط من الفواصل والنقاط الزائدة في الطرف
        portal = portal.trim().replace(/[:/]+$/, "");
        // إعادة صيغة الـ http البدائية
        if (!portal.startsWith('http')) {
            portal = 'http://' + portal;
        }
        return { portal: portal, mac: mac.trim() };
    }
    return null;
}

async function processAndCheck() {
    const rawInput = document.getElementById('rawInput').value;
    const lines = rawInput.split('\n');
    const outputContainer = document.getElementById('outputContainer');
    const loading = document.getElementById('loading');
    
    outputContainer.innerHTML = '';
    const targets = [];

    for (let line of lines) {
        const parsed = parseLine(line);
        if (parsed) targets.push(parsed);
    }

    if (targets.length === 0) {
        alert('لم يتم العثور على أي سطر يحتوي على ماك أدرس صحيح!');
        return;
    }

    loading.style.display = 'block';

    // فحص متوازي لكل السيرفرات المستخرجة
    const promises = targets.map(async (target) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span><strong>البورتال:</strong> <span style="color:#60a5fa">${target.portal}</span></span>
                <span><strong>الماك:</strong> <span style="color:#f59e0b">${target.mac}</span></span>
                <span class="status-badge" style="background:#4b5563">جاري الفحص...</span>
            </div>
        `;
        outputContainer.appendChild(card);

        try {
            // استدعاء ملف الـ API الداخلي الخاص بـ Vercel لتخطي CORS
            const response = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ portalUrl: target.portal, mac: target.mac })
            });
            const result = await response.json();

            if (result && result.success) {
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">
                        <div>
                            <strong>البورتال:</strong> <span style="color:#60a5fa">${target.portal}</span> | 
                            <strong>الماك:</strong> <span style="color:#f59e0b">${target.mac}</span>
                        </div>
                        <div>
                            <span class="status-badge success">شغال ✅</span>
                            <span style="margin-right: 15px;">ينتهي في: <b style="color:#ef4444">${result.expiry}</b></span>
                        </div>
                    </div>
                    <div class="grid-categories">
                        <div class="category-box">
                            <h4>📺 باقات البث المباشر (Live)</h4>
                            <ul>${result.live.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد تصنيفات</li>'}</ul>
                        </div>
                        <div class="category-box">
                            <h4>🎬 باقات الأفلام (VOD)</h4>
                            <ul>${result.vod.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد تصنيفات</li>'}</ul>
                        </div>
                        <div class="category-box">
                            <h4>🍿 باقات المسلسلات (Series)</h4>
                            <ul>${result.series.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد تصنيفات</li>'}</ul>
                        </div>
                    </div>
                `;
            } else {
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>البورتال:</strong> <span style="color:#9ca3af">${target.portal}</span> | 
                            <strong>الماك:</strong> <span style="color:#9ca3af">${target.mac}</span>
                        </div>
                        <span class="status-badge failed">غير شغال / مغلق ❌</span>
                    </div>
                `;
            }
        } catch (err) {
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div><strong>البورتال:</strong> ${target.portal}</div>
                    <span class="status-badge failed">خطأ في الاتصال ⚠️</span>
                </div>
            `;
        }
    });

    await Promise.all(promises);
    loading.style.display = 'none';
}
</script>

</body>
</html>
