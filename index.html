<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج وفاحص سيرفرات الماك الجماعي</title>
    <style>
        :root {
            --primary: #0070f3;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        textarea {
            width: 100%;
            height: 150px;
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            box-sizing: border-box;
            resize: vertical;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background: #0051b3; }
        .result-card {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .success { background: #16a34a; color: white; }
        .failed { background: #dc2626; color: white; }
        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .category-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 6px;
            border-right: 4px solid var(--primary);
            max-height: 200px;
            overflow-y: auto;
        }
        .category-box h4 { margin: 0 0 8px 0; color: #38bdf8; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .category-box ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
        .category-box li { padding: 4px 0; border-bottom: 1px dashed #334155; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔍 الفاحص الذكي لسيرفرات الماك (Bulk Parser & Checker)</h2>
    <p style="text-align: center; color: #94a3b8;">أدخل الأسطر مباشرة بأي صيغة (مثال: <code style="color:#38bdf8">http://domain.com:8080/c:00:1A:79:XX:XX:XX</code>)</p>
    
    <textarea id="rawInput" placeholder="ضع السيرفرات هنا... كل سيرفر في سطر جديد"></textarea>
    <button onclick="processAndCheck()">ابدأ المعالجة والفحص الجماعي 🚀</button>

    <div id="loading" style="display: none; text-align: center; margin-top: 20px; color: #38bdf8;">جاري استخراج البيانات وفحص السيرفرات بالتوازي...</div>
    
    <div id="outputContainer"></div>
</div>

<script>
// دالة لفصل الرابط عن الماك أدرس الذكي (Parser)
function parseLine(line) {
    line = line.trim();
    if (!line) return null;

    // نمط للبحث عن الماك أدرس داخل السطر
    const macRegex = /([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})/i;
    const match = line.match(macRegex);

    if (match) {
        const mac = match[0];
        // استخراج الرابط (كل ما هو قبل الماك أدرس ونقطتي القولين ":")
        let portal = line.split(mac)[0];
        if (portal.endsWith(':')) {
            portal = portal.slice(0, -1);
        }
        return { portal: portal.trim(), mac: mac.trim() };
    }
    return null;
}

async function processAndCheck() {
    const rawInput = document.getElementById('rawInput').value;
    const lines = rawInput.split('\n');
    const outputContainer = document.getElementById('outputContainer');
    const loading = document.getElementById('loading');
    
    outputContainer.innerHTML = '';
    
    const targets = [];
    for (let line of lines) {
        const parsed = parseLine(line);
        if (parsed) {
            targets.push(parsed);
        }
    }

    if (targets.length === 0) {
        alert('لم يتم العثور على روابط مدمجة بماك أدرس صحيح!');
        return;
    }

    loading.style.display = 'block';

    // فحص جميع السيرفرات بالتوازي
    const promises = targets.map(async (target) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>رابط البورتال:</strong> <span style="color:#38bdf8">${target.portal}</span>
                <strong>الماك:</strong> <span style="color:#fbbf24">${target.mac}</span>
                <span class="status-badge" style="background:#64748b">جاري الفحص...</span>
            </div>
        `;
        outputContainer.appendChild(card);

        const result = await checkMacServer(target.portal, target.mac);
        
        if (result.success) {
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">
                    <div>
                        <strong>البورتال:</strong> <span style="color:#38bdf8">${target.portal}</span> | 
                        <strong>الماك:</strong> <span style="color:#fbbf24">${target.mac}</span>
                    </div>
                    <div>
                        <span class="status-badge success">نشط ✅</span>
                        <span style="margin-right: 10px; font-size:14px;">ينتهي في: <b style="color:#f43f5e">${result.expiry}</b></span>
                    </div>
                </div>
                <div class="grid-categories">
                    <div class="category-box">
                        <h4>باقات البث المباشر (Live)</h4>
                        <ul>${result.live.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد قنوات</li>'}</ul>
                    </div>
                    <div class="category-box">
                        <h4>باقات الأفلام (VOD)</h4>
                        <ul>${result.vod.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد أفلام</li>'}</ul>
                    </div>
                    <div class="category-box">
                        <h4>باقات المسلسلات (Series)</h4>
                        <ul>${result.series.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد مسلسلات</li>'}</ul>
                    </div>
                </div>
            `;
        } else {
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>البورتال:</strong> <span style="color:#64748b">${target.portal}</span> | 
                        <strong>الماك:</strong> <span style="color:#64748b">${target.mac}</span>
                    </div>
                    <span class="status-badge failed">غير شغال / مغلق ❌</span>
                </div>
            `;
        }
    });

    await Promise.all(promises);
    loading.style.display = 'none';
}

// دالة الاتصال وجلب تصنيفات القنوات من السيرفر مباشرة
async function checkMacServer(portal, mac) {
    let cleanUrl = portal.trim().replace(/\/$/, "");
    if (!cleanUrl.endsWith('portal.php')) {
        cleanUrl += '/portal.php';
    }

    // بروكسي مجاني لتخطي حظر CORS من المتصفح مباشرة
    const proxyUrl = 'https://api.allorigins.win/get?url=';
    const headers = {
        'User-Agent': 'Mozilla/5.0 (QtEmbedded; U; Linux; C) AppleWebKit/533.3 (KHTML, like Gecko) MAG200 stbapp ver: 2 rev: 250 Safari/533.3',
        'Cookie': `mac=${encodeURIComponent(mac)}; stb_lang=en; timezone=Europe/Paris;`
    };

    try {
        // الخطوة 1: طلب الـ Profile لتاريخ الانتهاء
        const profileApi = `${cleanUrl}?type=stb&action=get_profile&JsHttpRequest=1-xml`;
        const profileRes = await fetch(`${proxyUrl}${encodeURIComponent(profileApi)}`);
        const profileJson = await profileRes.json();
        const profileData = JSON.parse(profileJson.contents)?.js;

        if (!profileData || profileData.active === false) {
            return { success: false };
        }

        const expiryDate = profileData.end_date || "غير محدد (مفتوح)";

        // الخطوة 2: جلب باقات البث المباشر (Live Genres)
        const liveApi = `${cleanUrl}?type=itv&action=get_genres&JsHttpRequest=1-xml`;
        const liveRes = await fetch(`${proxyUrl}${encodeURIComponent(liveApi)}`);
        const liveJson = await liveRes.json();
        const liveGenres = JSON.parse(liveJson.contents)?.js || [];
        const liveTitles = liveGenres.map(g => g.title);

        // الخطوة 3: جلب باقات الأفلام (VOD Genres)
        const vodApi = `${cleanUrl}?type=vod&action=get_categories&JsHttpRequest=1-xml`;
        const vodRes = await fetch(`${proxyUrl}${encodeURIComponent(vodApi)}`);
        const vodJson = await vodRes.json();
        const vodGenres = JSON.parse(vodJson.contents)?.js || [];
        const vodTitles = vodGenres.map(g => g.category_name || g.title);

        // الخطوة 4: جلب باقات المسلسلات (Series Genres)
        const seriesApi = `${cleanUrl}?type=series&action=get_genres&JsHttpRequest=1-xml`;
        const seriesRes = await fetch(`${proxyUrl}${encodeURIComponent(seriesApi)}`);
        const seriesJson = await seriesRes.json();
        const seriesGenres = JSON.parse(seriesJson.contents)?.js || [];
        const seriesTitles = seriesGenres.map(g => g.title);

        return {
            success: true,
            expiry: expiryDate,
            live: liveTitles.slice(0, 30), // جلب أول 30 تصنيف لتجنب ملء الشاشة
            vod: vodTitles.slice(0, 30),
            series: seriesTitles.slice(0, 30)
        };

    } catch (e) {
        return { success: false };
    }
}
</script>

</body>
</html>
