<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج وفاحص سيرفرات الماك الذكي</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0b0f19;
            --card-bg: #111827;
            --text: #f9fafb;
            --border: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        h2 { text-align: center; color: #3b82f6; margin-top: 0; }
        textarea {
            width: 100%;
            height: 200px;
            background: #030712;
            color: #10b981;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #1d4ed8; }
        .result-card {
            background: #030712;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }
        .success { background: #059669; color: white; }
        .failed { background: #dc2626; color: white; }
        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .category-box {
            background: #111827;
            padding: 12px;
            border-radius: 6px;
            border-top: 3px solid #3b82f6;
            max-height: 250px;
            overflow-y: auto;
        }
        .category-box h4 { margin: 0 0 10px 0; color: #60a5fa; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .category-box ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
        .category-box li { padding: 5px 0; border-bottom: 1px dashed #1f2937; color: #e5e7eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔍 الفاحص الذكي والمنظف التلقائي لسيرفرات الماك</h2>
    <p style="text-align: center; color: #9ca3af;">انسخ النص المليء بالرموز من التليجرام كما هو والصقه بالأسفل مباشرة 👇</p>
    
    <textarea id="rawInput" placeholder="ضع النص الكامل هنا (مثال لستة بوتات، رسائل تليجرام، إلخ)..."></textarea>
    <button onclick="processAndCheck()">استخراج وفحص السيرفرات تلقائياً 🚀</button>

    <div id="loading" style="display: none; text-align: center; margin-top: 20px; color: #3b82f6; font-weight: bold;">جاري استخراج السيرفرات وفحصها...</div>
    
    <div id="outputContainer"></div>
</div>

<script>
// دالة الفرز الذكي لاستخراج البورتال والماك من وسط الرموز والدوشة
function smartExtract(text) {
    // تعبير نمطي لاستخراج روابط الويب
    const urlRegex = /(https?:\/\/[^\s\s+]+)/gi;
    // تعبير نمطي لاستخراج الماك أدرس بجميع صيغه
    const macRegex = /([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})/g;

    const urls = text.match(urlRegex) || [];
    const macs = text.match(macRegex) || [];

    const pairs = [];
    
    // ربط كل بورتال تم العثور عليه بالماك الذي يليه بالترتيب
    const count = Math.min(urls.length, macs.length);
    for (let i = 0; i < count; i++) {
        let cleanPortal = urls[i].trim();
        
        // تنظيف الرابط من أي علامات أو رموز ملتصقة به في آخره
        cleanPortal = cleanPortal.replace(/☁️|📍|⚡|╭─•|├─•|➤|/g, '').trim();
        // إزالة الفواصل والنقاط الزائدة من الأطراف
        cleanPortal = cleanPortal.replace(/[:/]+$/, "");
        if (!cleanPortal.startsWith('http')) {
            cleanPortal = 'http://' + cleanPortal;
        }

        pairs.push({
            portal: cleanPortal,
            mac: macs[i].trim()
        });
    }
    return pairs;
}

async function processAndCheck() {
    const rawInput = document.getElementById('rawInput').value;
    const outputContainer = document.getElementById('outputContainer');
    const loading = document.getElementById('loading');
    
    outputContainer.innerHTML = '';
    
    // استخراج الداتا تلقائياً من وسط النص
    const targets = smartExtract(rawInput);

    if (targets.length === 0) {
        alert('لم يتم العثور على أي رابط بورتال أو ماك أدرس في النص المكتوب!');
        return;
    }

    loading.style.display = 'block';

    // بدء الفحص بالتوازي لكل السيرفرات المستخرجة
    const promises = targets.map(async (target) => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span><strong>البورتال المستخرج:</strong> <span style="color:#60a5fa">${target.portal}</span></span>
                <span><strong>الماك المستخرج:</strong> <span style="color:#f59e0b">${target.mac}</span></span>
                <span class="status-badge" style="background:#4b5563">جاري الفحص...</span>
            </div>
        `;
        outputContainer.appendChild(card);

        try {
            const response = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ portalUrl: target.portal, mac: target.mac })
            });
            const result = await response.json();

            if (result && result.success) {
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">
                        <div>
                            <strong>البورتال:</strong> <span style="color:#60a5fa">${target.portal}</span> | 
                            <strong>الماك:</strong> <span style="color:#f59e0b">${target.mac}</span>
                        </div>
                        <div>
                            <span class="status-badge success">شغال ✅</span>
                            <span style="margin-right: 15px;">ينتهي في: <b style="color:#ef4444">${result.expiry}</b></span>
                        </div>
                    </div>
                    <div class="grid-categories">
                        <div class="category-box">
                            <h4>📺 باقات البث المباشر (Live)</h4>
                            <ul>${result.live.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد تصنيفات</li>'}</ul>
                        </div>
                        <div class="category-box">
                            <h4>🎬 باقات الأفلام (VOD)</h4>
                            <ul>${result.vod.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد تصنيفات</li>'}</ul>
                        </div>
                        <div class="category-box">
                            <h4>🍿 باقات المسلسلات (Series)</h4>
                            <ul>${result.series.map(item => `<li>${item}</li>`).join('') || '<li>لا يوجد تصنيفات</li>'}</ul>
                        </div>
                    </div>
                `;
            } else {
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>البورتال:</strong> <span style="color:#9ca3af">${target.portal}</span> | 
                            <strong>الماك:</strong> <span style="color:#9ca3af">${target.mac}</span>
                        </div>
                        <span class="status-badge failed">غير شغال / مغلق ❌</span>
                    </div>
                `;
            }
        } catch (err) {
            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div><strong>البورتال:</strong> ${target.portal}</div>
                    <span class="status-badge failed">خطأ في الاتصال ⚠️</span>
                </div>
            `;
        }
    });

    await Promise.all(promises);
    loading.style.display = 'none';
}
</script>

</body>
</html>
